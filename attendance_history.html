<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Attendance History - Paathshala</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <style>
    .app { display: flex; min-height: 100vh; }
    .main { flex: 1; margin-left: 260px; background: #f8fafc; padding: 40px; }

    .sidebar { width: 260px; background: #0f172a; position: fixed; height: 100vh; color: #94a3b8; }
    .brand { padding: 30px 25px; font-size: 24px; font-weight: 800; color: white; border-bottom: 1px solid #1e293b; }
    .menu-item { display: flex; padding: 12px 25px; text-decoration: none; color: #94a3b8; border-radius: 8px; margin: 4px 15px; }
    .menu-item.active { background: #2563eb; color: white; }

    .filter-card {
      background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;
      display: flex; align-items: flex-end; gap: 20px; margin-bottom: 30px;
    }
    .search-btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }

    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .session-card {
      background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px;
      cursor: pointer; transition: 0.2s;
    }
    .session-card:hover { border-color: #2563eb; transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    .modal-content { background: white; margin: 5% auto; width: 500px; border-radius: 16px; overflow: hidden; }
    .modal-header { padding: 20px; background: #1e293b; color: white; display: flex; justify-content: space-between; }
    .student-row {
      padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;
    }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .present { background: #dcfce7; color: #16a34a; }
    .absent { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">Paathshala</div>
    <nav class="menu">
      <a class="menu-item" href="/faculty/dashboard">🏠 Dashboard</a>
      <a class="menu-item" href="/faculty/timetable">🗓️ Timetable</a>
      <a class="menu-item active" href="/faculty/attendance/history">✅ Attendance History</a>
      <a class="menu-item" href="/faculty/notes">📚 Notes</a>
      <a class="menu-item" href="/logout">🚪 Logout</a>
    </nav>
  </aside>

  <main class="main">
    <h1>Student Attendance History</h1>
    <p style="color: #64748b; margin-bottom: 25px;">Select a date to view the students marked in each lecture.</p>

    <div class="filter-card">
      <div style="display:flex; flex-direction:column; gap:5px;">
        <label style="font-size: 13px; font-weight: 700;">Select Date</label>
        <input type="date" id="historyDate" style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;">
      </div>
      <button class="search-btn" onclick="fetchStudentHistory()">Search Records</button>
    </div>

    <div id="historyGrid" class="history-grid"></div>
  </main>
</div>

<div id="statusModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Student Status List</h3>
      <span style="cursor:pointer" onclick="closeModal()">✖</span>
    </div>
    <div id="studentList" style="max-height: 400px; overflow-y: auto;"></div>
  </div>
</div>

<script>
  // ✅ default date from server (safe)
  document.getElementById('historyDate').value = "{{ date.today().isoformat() }}";

  let currentRecords = [];

  async function fetchStudentHistory() {
    const selectedDate = document.getElementById('historyDate').value;
    const grid = document.getElementById('historyGrid');
    grid.innerHTML = '<p>Loading...</p>';

    try {
      const response = await fetch(`/attendance/api/details?date=${selectedDate}`);
      currentRecords = await response.json();

      if (!Array.isArray(currentRecords) || currentRecords.length === 0) {
        grid.innerHTML = '<p>No attendance found for this date.</p>';
        return;
      }

      grid.innerHTML = currentRecords.map((session, index) => `
        <div class="session-card" onclick="showStudents(${index})">
          <div style="font-size:11px; color:#2563eb; font-weight:800;">LECTURE ${session.lecture || 'N/A'}</div>
          <h3 style="margin: 5px 0;">${session.subject}</h3>
          <p style="font-size:13px; color:#64748b;">Class: ${session.class_name}</p>
          <div style="margin-top:10px; font-size:12px; color:#2563eb; font-weight:600;">View Student Status ➔</div>
        </div>
      `).join('');

    } catch (error) {
      grid.innerHTML = '<p style="color:red;">Error fetching data.</p>';
    }
  }

  function showStudents(index) {
    const session = currentRecords[index];
    const listDiv = document.getElementById('studentList');
    document.getElementById('modalTitle').innerText = `${session.subject} - ${session.class_name}`;

    listDiv.innerHTML = (session.students || []).map(st => `
      <div class="student-row">
        <span><strong>${st.name}</strong></span>
        <span class="status-badge ${String(st.status).toLowerCase() === 'present' ? 'present' : 'absent'}">
          ${st.status}
        </span>
      </div>
    `).join('');

    document.getElementById('statusModal').style.display = 'block';
  }

  function closeModal() { document.getElementById('statusModal').style.display = 'none'; }
</script>

</body>
</html>
