<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student - Paathshala</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="/admin/dashboard">🏠 Dashboard</a>
    <a href="{{ url_for('student_bp.view_students') }}">📋 View Students</a>
    <a href="javascript:history.back()">⬅ Back</a>
    <a href="/logout" class="logout">🚪 Logout</a>
</div>

<div class="content">
    <h1>Edit Student Profile</h1>
    <p>Modify details for <strong>{{ student.name }}</strong></p>

    <form id="studentForm">
        
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="name" value="{{ student.name }}" required>
        </div>

        <div class="form-group">
            <label>Select Class</label>
            <select id="student_class" required>
                <option value="7th" {% if student.student_class == '7th' %}selected{% endif %}>7th Grade</option>
                <option value="8th" {% if student.student_class == '8th' %}selected{% endif %}>8th Grade</option>
                <option value="9th" {% if student.student_class == '9th' %}selected{% endif %}>9th Grade</option>
                <option value="10th" {% if student.student_class == '10th' %}selected{% endif %}>10th Grade</option>
            </select>
        </div>

        <div class="form-group">
            <label>School Name</label>
            <input type="text" id="school" value="{{ student.school }}" required>
        </div>

        <div class="form-group">
            <label>Academic Year</label>
            <input type="text" id="academic_year" value="{{ student.academic_year }}" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" value="{{ student.phone }}" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" value="{{ student.email }}" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" value="{{ student.dob }}" required>
        </div>

        <div class="form-group">
            <label>Update Password</label>
            <input type="password" id="password" placeholder="Leave blank to keep current">
        </div>

        <div class="form-group full-width">
            <label>Home Address</label>
            <input type="text" id="address" value="{{ student.address }}" required>
        </div>

        <div class="full-width" style="margin-top: 10px;">
            <label><strong>Subjects Enrolled</strong></label>
        </div>
        
        <div class="subject-grid">
            {% for sub in ["Maths", "Science", "English", "Social Studies", "Hindi", "Sanskrit", "Marathi"] %}
            <label class="subject-item">
                <input type="checkbox" name="subjects" value="{{ sub }}"
                {% if sub in student.subjects %}checked{% endif %}>
                {{ sub }}
            </label>
            {% endfor %}
        </div>

        <button type="button" onclick="updateStudent()">💾 Save Changes</button>
        <p id="msg"></p>
    </form>
</div>

<script>
function updateStudent() {
    let subjects = [];
    document.querySelectorAll('input[name="subjects"]:checked')
        .forEach(cb => subjects.push(cb.value));

    const data = {
        name: document.getElementById("name").value,
        student_class: document.getElementById("student_class").value,
        school: document.getElementById("school").value,
        academic_year: document.getElementById("academic_year").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        dob: document.getElementById("dob").value,
        password: document.getElementById("password").value,
        subjects: subjects
    };

    // UI Feedback: Loading
    const btn = document.querySelector("button");
    btn.innerText = "Updating...";
    btn.disabled = true;

    fetch("http://localhost:5000/student/update/{{ student.id }}", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        const msg = document.getElementById("msg");
        msg.innerText = res.message;
        msg.style.color = res.success ? "green" : "red";
        
        btn.innerText = "💾 Save Changes";
        btn.disabled = false;

        // Redirect back to list after 1.5 seconds if successful
        if (res.success) {
            setTimeout(() => {
                window.location.href = "{{ url_for('student_bp.view_students') }}";
            }, 1500);
        }
    })
    .catch(err => {
        console.error("Update Error:", err);
        document.getElementById("msg").innerText = "Error: Failed to update data.";
        btn.disabled = false;
    });
}
</script>

</body>
</html>
