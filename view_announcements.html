<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Announcements - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<!-- ✅ Sidebar -->
<div class="sidebar">
    <h2>Admin Panel</h2>

    <a href="{{ url_for('admin_bp.admin_dashboard') }}">🏠 Dashboard</a>
    <a href="{{ url_for('announcement_bp.add_announcement') }}">➕ Add Announcement</a>
    <a href="/logout" class="logout">🚪 Logout</a>
</div>

<!-- ✅ Main Content -->
<div class="content">
    <h1 style="text-align:center;">📄 All Announcements</h1>

    <!-- ✅ Announcement List Box -->
    <div class="box-card">

        {% if announcements %}

            {% for a in announcements %}
            <div class="announcement-box">

                <h3>{{ a.title }}</h3>

                <p>{{ a.description }}</p>

                <p><b>Date:</b> {{ a.event_date }}</p>
                <p><b>Type:</b> {{ a.type }}</p>

                <a href="/announcement/delete/{{ a.id }}"
                   class="btn-delete">
                   ❌ Delete
                </a>
            </div>
            {% endfor %}

        {% else %}
            <p style="text-align:center;">No announcements available.</p>
        {% endif %}

    </div>
</div>

</body>
</html>
